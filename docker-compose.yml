services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: senus
      POSTGRES_PASSWORD: senus
      POSTGRES_DB: senus
    ports: ["5432:5432"]
    volumes: [pgdata:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U senus"]
      interval: 3s
      retries: 10

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg2://senus:senus@db:5432/senus
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      JWT_SECRET: ${JWT_SECRET:-dev-only-change-me}
      CORS_ORIGINS: http://localhost:3000
    ports: ["8000:8000"]
    volumes:
      - ./data:/data
    depends_on:
      db: { condition: service_healthy }

  web:
    build:
      context: .
      dockerfile: frontend.Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000
    ports: ["3000:3000"]
    depends_on: [api]

volumes:
  pgdata:
